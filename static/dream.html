<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境 - 故事织机</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        @font-face {
            font-family: 'SignaturaMonoline';
            src: url('/This-July/Signatura-Monoline-3.ttf') format('truetype');
        }
        .dream-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 56px);
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }
        .dream-card {
            position: relative;
            z-index: 2;
            max-width: 640px;
            width: 100%;
            background: rgba(14, 26, 50, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(200, 180, 60, 0.12);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 0 60px rgba(60, 120, 200, 0.03);
            text-align: center;
        }
        .dream-card h1 {
            color: #e8d48b;
            font-size: 36px;
            letter-spacing: 8px;
            margin-bottom: 16px;
            text-shadow: 0 0 30px rgba(200, 180, 60, 0.2);
        }
        .dream-card p {
            color: rgba(200, 180, 60, 0.5);
            font-size: 15px;
            line-height: 2;
        }

        /* 手臂 — 左下角伸出，静止不动 */
        .dream-arm {
            position: fixed;
            left: 0;
            bottom: 0;
            z-index: 1;
            width: 45vw;
            max-width: 500px;
            height: auto;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .dream-arm.vanish {
            opacity: 0;
            transition: none;
        }

        /* 烟雾粒子 */
        .smoke-particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,220,180,0.5) 0%, rgba(255,200,150,0.2) 40%, transparent 70%);
            animation: smoke-float 3s ease-out forwards;
            z-index: 3;
        }
        @keyframes smoke-float {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0.6; }
            50% { opacity: 0.4; }
            100% { transform: translate(var(--sx), var(--sy)) scale(3); opacity: 0; }
        }

        /* 星星 — 右上角 20% 位置，图片本身呼吸 */
        .dream-star {
            position: fixed;
            top: 20%;
            right: 20%;
            z-index: 1;
            width: 8vw;
            max-width: 100px;
            height: auto;
            cursor: pointer;
            animation: star-breathe 6s ease-in-out infinite;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .dream-star.vanish {
            animation: none;
            opacity: 0;
            transition: none;
        }
        @keyframes star-breathe {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            20% { opacity: 1; transform: scale(1.15); }
            35% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 0.85; transform: scale(1.06); }
            65% { opacity: 0.35; transform: scale(0.88); }
            85% { opacity: 0.75; transform: scale(1.03); }
        }

    </style>
    <style>
        .dream-text {
            position: fixed;
            z-index: 2;
            pointer-events: none;
            text-align: center;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }
        .dream-text.vanish {
            opacity: 0;
        }
        .dream-text-main {
            font-family: 'SignaturaMonoline', cursive;
            font-style: italic;
            color: rgba(200, 180, 60, 0.7);
            font-size: 39px;
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 0 0 60px rgba(200, 180, 60, 0.12);
            text-align: center;
            line-height: 1.6;
            max-width: 800px;
            padding: 0 20px;
        }
        .dream-text-main .line1 {
            display: block;
            font-family: 'SignaturaMonoline', cursive !important; font-style: italic !important;
        }
        .dream-text-main .line1 em {
            font-style: italic;
            color: rgba(200, 180, 60, 0.6);
            font-family: 'SignaturaMonoline', cursive !important; font-style: italic !important;
        }
        .dream-text-main .line2 {
            display: block;
            margin-top: 8px;
            color: rgba(200, 180, 60, 0.55);
            font-family: 'SignaturaMonoline', cursive !important; font-style: italic !important;
        }
        .dream-text-sub {
            color: rgba(200, 180, 60, 0.25);
            font-size: 20px;
            letter-spacing: 2px;
            margin-top: 6px;
            text-align: right;
            margin-right: -40px;
        }
        @media (max-width: 768px) {
            .dream-text-main { font-size: 20px; letter-spacing: 2px; }
            .dream-text-sub { font-size: 11px; margin-right: -20px; }
        }
        .ripple-container {
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
        }
        .ripple {
            position: absolute; border-radius: 50%;
            transform: translate(-50%,-50%) scale(0); pointer-events: none;
            background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.18) 0%, rgba(200,180,60,0.12) 15%, rgba(200,180,60,0.035) 45%, transparent 65%);
            border: 1.5px solid rgba(200,180,60,0.3);
            box-shadow: inset 0 -4px 12px rgba(100,150,220,0.12), inset 0 4px 8px rgba(255,255,255,0.1), 0 0 20px rgba(200,180,60,0.08);
            backdrop-filter: blur(2px);
        }
        .ripple:nth-child(odd) {
            border-color: rgba(200,180,60,0.22);
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.14) 0%, rgba(200,180,60,0.08) 15%, transparent 60%);
            box-shadow: inset 0 -3px 10px rgba(100,150,220,0.1), inset 0 3px 6px rgba(255,255,255,0.08), 0 0 16px rgba(200,180,60,0.06);
        }
        .ripple:nth-child(3n) {
            border-color: rgba(180,200,255,0.15);
            background: radial-gradient(circle at 45% 40%, rgba(255,255,255,0.1) 0%, rgba(180,200,255,0.07) 15%, transparent 55%);
            box-shadow: inset 0 -3px 10px rgba(100,150,220,0.12), inset 0 3px 6px rgba(255,255,255,0.06), 0 0 14px rgba(180,200,255,0.06);
        }
        .ripple-1 { animation: ripple-1 1.2s ease-out forwards; }
        .ripple-2 { animation: ripple-2 1.0s ease-out forwards; }
        .ripple-3 { animation: ripple-3 0.9s ease-out forwards; }
        .ripple-4 { animation: ripple-4 0.7s ease-out forwards; }
        @keyframes ripple-1 { to { transform: translate(-50%,-50%) scale(5); opacity: 0; } }
        @keyframes ripple-2 { to { transform: translate(-50%,-50%) scale(4); opacity: 0; } }
        @keyframes ripple-3 { to { transform: translate(-50%,-50%) scale(3); opacity: 0; } }
        @keyframes ripple-4 { to { transform: translate(-50%,-50%) scale(2); opacity: 0; } }

        /* 页面跳转过渡遮罩 */
        .page-transition {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #0a0e1a;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        .page-transition.active {
            opacity: 1;
        }
    </style>
<body>

<div class="falling-stars" id="fallingStars"></div>

<nav class="navbar">
    <div class="nav-inner">
        <div class="nav-left">
            <img src="/pictures/未来设计师大赛-logo-白.png" class="nav-logo">
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="/static/home.html" class="nav-link">首页</a>
                <a href="/static/dream.html" class="nav-link active">梦境</a>
                <a href="/static/index.html" class="nav-link">故事织机</a>
                <a href="/static/about.html" class="nav-link">关于我们</a>
            </div>
        </div>
    </div>
</nav>

<!-- 手臂（左下） -->
<img src="/pictures/手臂5.png" class="dream-arm" alt="">
<!-- 星星（右上 20%） -->
<img src="/pictures/star.png" class="dream-star" alt="">

<div class="dream-text">
    <div class="dream-text-main">
        <span class="line1">Fold today's fatigue into your pillow,<br>and tomorrow's sunrise will say <em>good morning</em> for the world.</span>
        <span class="line2">Good night.</span>
    </div>
    <div class="dream-text-sub">Click the star</div>
    <div class="dream-text-sub" style="text-align:right; margin-right:-15px; font-family:'SweetSensations',cursive; font-style:italic;">点击星星</div>

</div>

<div class="ripple-container" id="rippleContainer"></div>
<div class="page-transition" id="pageTransition"></div>

<script>
(function initFallingStars() {
    const container = document.getElementById('fallingStars');
    const count = 35;
    for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'falling-star';
        const size = 2 + Math.random() * 3;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = '-10px';
        star.style.animationDuration = (8 + Math.random() * 12) + 's';
        star.style.animationDelay = (Math.random() * 20) + 's';
        container.appendChild(star);
    }
})();

// 点击水波纹
(function initRipple() {
    var container = document.getElementById('rippleContainer');
    document.addEventListener('click', function(e) {
        if (e.target.closest('a')) return;
        spawnRipple(e.clientX, e.clientY);
    });
    document.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function(e) {
            var href = a.getAttribute('href');
            if (!href || href === '#' || href.startsWith('javascript:')) return;
            e.preventDefault();
            var rect = a.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top + rect.height / 2;
            spawnRipple(cx, cy);
            setTimeout(function() { window.location.href = href; }, 350);
        });
    });
    function spawnRipple(cx, cy) {
        var sizes = [20, 35, 50, 65];
        var delays = [0, 60, 130, 210];
        sizes.forEach(function(size, i) {
            var ripple = document.createElement('div');
            ripple.className = 'ripple ripple-' + (i + 1);
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = cx + 'px';
            ripple.style.top = cy + 'px';
            ripple.style.animationDelay = delays[i] + 'ms';
            container.appendChild(ripple);
            ripple.addEventListener('animationend', function() { ripple.remove(); });
        });
    }
})();

// 点击星星 — 梦幻烟雾消散后跳转到故事织机
document.addEventListener('click', function(e) {
    if (!e.target.classList.contains('dream-star')) return;
    vanishScene();
});
function vanishScene() {
    if (document.body.classList.contains('vanished')) return;
    document.body.classList.add('vanished');

    var arm = document.querySelector('.dream-arm');
    var star = document.querySelector('.dream-star');
    var text = document.querySelector('.dream-text');

    arm.classList.add('vanish');
    star.classList.add('vanish');
    text.classList.add('vanish');

    // 从星星位置向右上方（东北）飘散
    var starRect = star.getBoundingClientRect();
    var cx = starRect.left + starRect.width / 2;
    var cy = starRect.top + starRect.height / 2;

    for (var i = 0; i < 40; i++) {
        var particle = document.createElement('div');
        particle.className = 'smoke-particle';
        var size = 4 + Math.random() * 12;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = (cx + (Math.random() - 0.5) * 30) + 'px';
        particle.style.top = (cy + (Math.random() - 0.5) * 30) + 'px';
        particle.style.setProperty('--sx', (100 + Math.random() * 300) + 'px');
        particle.style.setProperty('--sy', -(100 + Math.random() * 300) + 'px');
        particle.style.animationDuration = (2 + Math.random() * 2) + 's';
        particle.style.animationDelay = (Math.random() * 0.6) + 's';
        document.body.appendChild(particle);
        particle.addEventListener('animationend', function() { this.remove(); });
    }

    // 从手臂位置向左下方（西南）飘散
    var armRect = arm.getBoundingClientRect();
    var ax = armRect.left + armRect.width / 2;
    var ay = armRect.top + armRect.height / 2;

    for (var j = 0; j < 30; j++) {
        var p2 = document.createElement('div');
        p2.className = 'smoke-particle';
        var s2 = 4 + Math.random() * 12;
        p2.style.width = s2 + 'px';
        p2.style.height = s2 + 'px';
        p2.style.left = (ax + (Math.random() - 0.5) * 60) + 'px';
        p2.style.top = (ay + (Math.random() - 0.5) * 60) + 'px';
        p2.style.setProperty('--sx', -(50 + Math.random() * 250) + 'px');
        p2.style.setProperty('--sy', (50 + Math.random() * 200) + 'px');
        p2.style.animationDuration = (2.5 + Math.random() * 2) + 's';
        p2.style.animationDelay = (Math.random() * 0.5) + 's';
        p2.style.background = 'radial-gradient(circle, rgba(255,200,150,0.4) 0%, rgba(200,180,120,0.15) 40%, transparent 70%)';
        document.body.appendChild(p2);
        p2.addEventListener('animationend', function() { this.remove(); });
    }

    // 从文字位置飘散
    var textRect = text.getBoundingClientRect();
    var tx = textRect.left + textRect.width / 2;
    var ty = textRect.top + textRect.height / 2;

    for (var k = 0; k < 60; k++) {
        var p3 = document.createElement('div');
        p3.className = 'smoke-particle';
        var s3 = 3 + Math.random() * 10;
        p3.style.width = s3 + 'px';
        p3.style.height = s3 + 'px';
        p3.style.left = (tx + (Math.random() - 0.5) * textRect.width) + 'px';
        p3.style.top = (ty + (Math.random() - 0.5) * textRect.height) + 'px';
        if (k < 30) {
            p3.style.setProperty('--sx', (80 + Math.random() * 250) + 'px');
            p3.style.setProperty('--sy', -(80 + Math.random() * 250) + 'px');
        } else {
            p3.style.setProperty('--sx', -(80 + Math.random() * 250) + 'px');
            p3.style.setProperty('--sy', (50 + Math.random() * 200) + 'px');
        }
        p3.style.animationDuration = (2 + Math.random() * 2) + 's';
        p3.style.animationDelay = (Math.random() * 0.4) + 's';
        p3.style.background = 'radial-gradient(circle, rgba(255,220,180,0.35) 0%, rgba(200,180,60,0.12) 40%, transparent 70%)';
        document.body.appendChild(p3);
        p3.addEventListener('animationend', function() { this.remove(); });
    }

    // 烟雾消散后，黑色遮罩淡入，再跳转到故事织机
    setTimeout(function() {
        document.getElementById('pageTransition').classList.add('active');
        setTimeout(function() {
            window.location.href = '/static/index.html';
        }, 600);
    }, 1800);
}
</script>
</body>
</html>
