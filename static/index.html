<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 关键词故事生成器</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .ripple-container {
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
        }
        .ripple {
            position: absolute; border-radius: 50%;
            transform: translate(-50%,-50%) scale(0); pointer-events: none;
            background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.18) 0%, rgba(200,180,60,0.12) 15%, rgba(200,180,60,0.035) 45%, transparent 65%);
            border: 1.5px solid rgba(200,180,60,0.3);
            box-shadow: inset 0 -4px 12px rgba(100,150,220,0.12), inset 0 4px 8px rgba(255,255,255,0.1), 0 0 20px rgba(200,180,60,0.08);
            backdrop-filter: blur(2px);
        }
        .ripple:nth-child(odd) {
            border-color: rgba(200,180,60,0.22);
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.14) 0%, rgba(200,180,60,0.08) 15%, transparent 60%);
            box-shadow: inset 0 -3px 10px rgba(100,150,220,0.1), inset 0 3px 6px rgba(255,255,255,0.08), 0 0 16px rgba(200,180,60,0.06);
        }
        .ripple:nth-child(3n) {
            border-color: rgba(180,200,255,0.15);
            background: radial-gradient(circle at 45% 40%, rgba(255,255,255,0.1) 0%, rgba(180,200,255,0.07) 15%, transparent 55%);
            box-shadow: inset 0 -3px 10px rgba(100,150,220,0.12), inset 0 3px 6px rgba(255,255,255,0.06), 0 0 14px rgba(180,200,255,0.06);
        }
        .ripple-1 { animation: ripple-1 1.2s ease-out forwards; }
        .ripple-2 { animation: ripple-2 1.0s ease-out forwards; }
        .ripple-3 { animation: ripple-3 0.9s ease-out forwards; }
        .ripple-4 { animation: ripple-4 0.7s ease-out forwards; }
        @keyframes ripple-1 { to { transform: translate(-50%,-50%) scale(5); opacity: 0; } }
        @keyframes ripple-2 { to { transform: translate(-50%,-50%) scale(4); opacity: 0; } }
        @keyframes ripple-3 { to { transform: translate(-50%,-50%) scale(3); opacity: 0; } }
        @keyframes ripple-4 { to { transform: translate(-50%,-50%) scale(2); opacity: 0; } }

        /* 页面跳转过渡遮罩 */
        .page-transition {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #0a0e1a;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        .page-transition.incoming {
            opacity: 1;
        }
        .page-transition.incoming.done {
            opacity: 0;
        }

        /* 最大外层盒子 — 居中外层 */
        .page-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 20px;
        }
        /* 双卡片行 — 整体居中 */
        .card-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        /* 双卡片通用样式 */
        .card {
            background: rgba(14, 26, 50, 0.55);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(200, 180, 60, 0.12);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 0 60px rgba(60, 120, 200, 0.03);
            overflow: hidden;
        }
        /* 历史记录卡片（左侧） */
        .card-history {
            width: 240px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            max-height: calc(100vh - 96px);
            overflow-y: auto;
        }
        .card-history::-webkit-scrollbar { width: 4px; }
        .card-history::-webkit-scrollbar-track { background: transparent; }
        .card-history::-webkit-scrollbar-thumb { background: rgba(200, 180, 60, 0.2); border-radius: 4px; }
        .card-history .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(200, 180, 60, 0.1);
        }
        .card-history .card-header h2 {
            color: #c4b070;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .card-history .sidebar-toggle,
        .card-history .btn-clear-all {
            background: none;
            border: none;
            color: rgba(200, 180, 60, 0.3);
            cursor: pointer;
            font-size: 15px;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .card-history .sidebar-toggle:hover,
        .card-history .btn-clear-all:hover {
            background: rgba(200, 180, 60, 0.1);
            color: rgba(200, 180, 60, 0.6);
        }
        .card-history .sidebar-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        /* 每条历史记录为独立小卡片 */
        .card-history .history-item {
            background: rgba(200, 180, 60, 0.04);
            border: 1px solid rgba(200, 180, 60, 0.08);
            border-radius: 12px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
        }
        .card-history .history-item:hover {
            background: rgba(200, 180, 60, 0.08);
            border-color: rgba(200, 180, 60, 0.18);
        }
        .card-history .history-item.active {
            background: rgba(200, 180, 60, 0.1);
            border-color: rgba(200, 180, 60, 0.25);
        }
        .card-history .history-item:hover .history-del { opacity: 1; }
        .card-history .history-del {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 50%;
            background: rgba(200, 180, 60, 0.1);
            color: rgba(200, 180, 60, 0.4);
            font-size: 14px;
            line-height: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
            opacity: 0;
        }
        .card-history .history-del:hover {
            background: rgba(200, 100, 60, 0.25);
            color: #e89070;
        }
        .card-history .h-time {
            color: rgba(200, 180, 60, 0.3);
            font-size: 11px;
            margin-bottom: 4px;
        }
        .card-history .h-words {
            color: #c4b070;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-history .h-preview {
            color: rgba(200, 180, 60, 0.3);
            font-size: 12px;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-style: italic;
        }
        .card-history .sidebar-list::-webkit-scrollbar { width: 4px; }
        .card-history .sidebar-list::-webkit-scrollbar-track { background: transparent; }
        .card-history .sidebar-list::-webkit-scrollbar-thumb {
            background: rgba(200, 180, 60, 0.15);
            border-radius: 4px;
        }
        .card-history .sidebar-empty {
            color: rgba(200, 180, 60, 0.2);
            font-size: 13px;
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }
        .card-history .sidebar-empty.hidden { display: none; }
        /* 侧边栏遮罩（手机端） */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 80;
            pointer-events: none;
        }
        .sidebar-overlay.active { display: block; pointer-events: auto; }

        /* 旧的 sidebar 全局样式覆盖 — 收起功能 */
        .card-history.collapsed {
            width: 44px;
            min-width: 44px;
            padding: 24px 10px;
        }
        .card-history.collapsed .sidebar-list,
        .card-history.collapsed .sidebar-empty {
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .card-history.collapsed .card-header h2,
        .card-history.collapsed .btn-clear-all {
            opacity: 0;
            width: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .card-history.collapsed .card-header {
            justify-content: center;
            padding-bottom: 0;
            border-bottom: none;
            margin-bottom: 0;
            gap: 0;
        }
        .card-history.collapsed .card-footer {
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .card-history .card-footer {
            padding-top: 12px;
            border-top: 1px solid rgba(200, 180, 60, 0.1);
            margin-top: auto;
        }
        .card-history .sidebar-settings-btn {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(200, 180, 60, 0.15);
            background: rgba(200, 180, 60, 0.06);
            color: #c4b070;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .card-history .sidebar-settings-btn:hover {
            background: rgba(200, 180, 60, 0.14);
            border-color: rgba(200, 180, 60, 0.35);
            color: #e8d48b;
        }
        /* 故事织机卡片（右侧 — 主内容） */
        .card-loom {
            width: 680px;
            position: relative;
            padding: 40px;
            max-height: calc(100vh - 96px);
            overflow-y: auto;
        }
        .card-loom::-webkit-scrollbar { width: 4px; }
        .card-loom::-webkit-scrollbar-track { background: transparent; }
        .card-loom::-webkit-scrollbar-thumb { background: rgba(200, 180, 60, 0.2); border-radius: 4px; }
        /* 压矮 output-meta 盒子 */
        .card-loom .output-meta {
            padding: 2px 0 2px;
            margin: 0;
            line-height: 1.2;
        }
        .card-loom .container {
            all: unset;
            display: block;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                flex-direction: column;
                padding: 8px;
                gap: 8px;
            }
            .card-history {
                position: fixed;
                top: 0;
                left: -280px;
                width: 260px;
                height: 100vh;
                z-index: 90;
                border-right: 1px solid rgba(200, 180, 60, 0.15);
                border-radius: 0;
                transition: left 0.3s ease;
                background: rgba(10, 22, 40, 0.95);
                backdrop-filter: blur(20px);
                padding: 20px 16px 24px;
                border: none;
                box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            }
            .card-history.open { left: 0; }
            .card-history .sidebar-list {
                max-height: none;
                flex: 1;
            }
            .card-loom {
                padding: 20px 16px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>

<!-- 页面跳转过渡遮罩 -->
<div class="page-transition" id="pageTransition"></div>

<!-- 洒落星光 -->
<div class="falling-stars" id="fallingStars"></div>

<!-- 顶部导航栏 -->
<nav class="navbar">
    <div class="nav-inner">
        <div class="nav-left">
            <button class="nav-menu-btn" id="menuBtn">☰</button>
            <img src="/pictures/未来设计师大赛-logo-白.png" class="nav-logo">
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="/static/home.html" class="nav-link">首页</a>
                <a href="/static/dream.html" class="nav-link">梦境</a>
                <a href="/static/index.html" class="nav-link active">故事织机</a>
                <a href="/static/about.html" class="nav-link">关于我们</a>
            </div>
        </div>
    </div>
</nav>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <div class="modal-header">
            <span>设置</span>
            <button class="modal-close" id="settingsCloseBtn">×</button>
        </div>
        <div class="modal-body">
            <div class="modal-section">
                <label class="modal-label">选择模型</label>
                <select class="modal-select" id="modelSelect">
                    <option value="glm">智谱 GLM-4-Flash</option>
                    <option value="deepseek">DeepSeek V4 Flash</option>
                </select>
            </div>
            <div class="modal-section" id="apiKeySection">
                <label class="modal-label">API Key（智谱 GLM）</label>
                <div class="api-key-row">
                    <input type="password" id="apiKeyGlm" placeholder="输入智谱 API Key">
                    <span class="api-status" id="statusGlm"></span>
                </div>
                <button class="btn-save-key" data-target="glm">💾 保存</button>
            </div>
            <div class="modal-section" id="apiKeySectionDs" style="display:none">
                <label class="modal-label">API Key（DeepSeek）</label>
                <div class="api-key-row">
                    <input type="password" id="apiKeyDs" placeholder="输入 DeepSeek API Key">
                    <span class="api-status" id="statusDs"></span>
                </div>
                <button class="btn-save-key" data-target="ds">💾 保存</button>
            </div>
        </div>
    </div>
</div>

<div class="page-wrapper">
    <!-- 侧边栏遮罩（手机端用） -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="card-row">
    <!-- 历史记录卡片（左侧） -->
    <aside class="card card-history" id="sidebar">
        <div class="card-header">
            <button class="sidebar-toggle" id="sidebarToggle" title="收起/展开">◀</button>
            <h2>历史记录</h2>
            <button class="btn-clear-all" id="clearAllBtn" title="清空所有历史">🗑️</button>
        </div>
        <div class="sidebar-list" id="historyList"></div>
        <div class="sidebar-empty" id="historyEmpty">暂无历史故事</div>
        <div class="card-footer">
            <button class="sidebar-settings-btn" id="sidebarSettingsBtn">⚙️ 设置</button>
        </div>
    </aside>

    <!-- 故事织机卡片（右侧） -->
    <div class="card card-loom">
        <svg class="vortex" viewBox="0 0 500 500" preserveAspectRatio="xMidYMid meet">
            <defs>
                <radialGradient id="vg-vortex" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="rgba(230,210,80,0.25)" />
                    <stop offset="25%" stop-color="rgba(200,190,90,0.18)" />
                    <stop offset="50%" stop-color="rgba(100,170,240,0.12)" />
                    <stop offset="100%" stop-color="rgba(60,120,200,0)" />
                </radialGradient>
            </defs>
            <circle cx="250" cy="220" r="240" fill="url(#vg-vortex)" />
            <ellipse cx="280" cy="160" rx="180" ry="80" fill="none" stroke="rgba(230,210,80,0.25)" stroke-width="5" transform="rotate(-18 280 160)" />
            <ellipse cx="280" cy="160" rx="150" ry="65" fill="none" stroke="rgba(230,210,80,0.18)" stroke-width="4" transform="rotate(-18 280 160)" />
            <ellipse cx="280" cy="160" rx="120" ry="50" fill="none" stroke="rgba(100,180,245,0.15)" stroke-width="4" transform="rotate(-18 280 160)" />
            <ellipse cx="280" cy="160" rx="90" ry="35" fill="none" stroke="rgba(230,210,80,0.14)" stroke-width="3" transform="rotate(-18 280 160)" />
            <ellipse cx="280" cy="160" rx="60" ry="22" fill="none" stroke="rgba(100,180,245,0.12)" stroke-width="3" transform="rotate(-18 280 160)" />
            <ellipse cx="280" cy="160" rx="35" ry="12" fill="none" stroke="rgba(230,210,80,0.10)" stroke-width="2" transform="rotate(-18 280 160)" />
        </svg>
        <h1>故事织机</h1>
        <p class="subtitle">输入三个关键词，让 AI 为你编织一个故事</p>

        <div class="section">
            <div class="section-label">
                <span>关键词</span>
                <div class="option-group">
                    <select class="select-opt" id="styleSelect">
                        <option value="温馨">温馨</option>
                        <option value="暗黑">暗黑</option>
                        <option value="搞笑">搞笑</option>
                    </select>
                    <select class="select-opt" id="lengthSelect">
                        <option value="短篇">短篇</option>
                        <option value="中篇" selected>中篇</option>
                        <option value="长篇">长篇</option>
                    </select>
                    <button class="btn-random" id="randomBtn">🎲 随机</button>
                </div>
            </div>
            <div class="keyword-group">
                <input type="text" id="kw1" placeholder="关键词 1" maxlength="20">
                <input type="text" id="kw2" placeholder="关键词 2" maxlength="20">
                <input type="text" id="kw3" placeholder="关键词 3" maxlength="20">
            </div>
            <p class="error" id="kwError">请至少输入一个关键词，或点击「随机」</p>
        </div>

        <div class="section">
            <div class="section-label"><span>用户编辑区</span></div>
            <textarea class="user-edit" id="userEdit" placeholder="在此处修改或续写故事内容…（可留空）"></textarea>
        </div>

        <button class="btn-generate" id="generateBtn">✨ 生成故事</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span class="loading-text">AI 正在编织故事…</span>
        </div>

        <div class="output" id="output">
            <div class="output-header">
                <div class="keywords-used" id="outputKeywords"></div>
                <div class="output-actions">
                    <button class="btn-continue" id="continueBtn" style="display:none">📝 继续生成</button>
                    <button class="btn-revise" id="reviseBtn" style="display:none">✏️ 根据意见修改</button>
                    <button class="btn-save" id="saveBtn">💾 保存</button>
                </div>
            </div>
            <div id="outputContent"></div>
        </div>
    </div>
</div>
</div>

<div class="ripple-container" id="rippleContainer"></div>

<script>
// 防止浏览器恢复滚动位置导致刷新后自动下滑
history.scrollRestoration = 'manual';
window.scrollTo(0, 0);
</script>
<script>
// 点击水波纹
(function initRipple() {
    var container = document.getElementById('rippleContainer');
    document.addEventListener('click', function(e) {
        if (e.target.closest('a')) return;
        spawnRipple(e.clientX, e.clientY);
    });
    document.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function(e) {
            var href = a.getAttribute('href');
            if (!href || href === '#' || href.startsWith('javascript:')) return;
            e.preventDefault();
            var rect = a.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top + rect.height / 2;
            spawnRipple(cx, cy);
            setTimeout(function() { window.location.href = href; }, 350);
        });
    });
    function spawnRipple(cx, cy) {
        var sizes = [20, 35, 50, 65];
        var delays = [0, 60, 130, 210];
        sizes.forEach(function(size, i) {
            var ripple = document.createElement('div');
            ripple.className = 'ripple ripple-' + (i + 1);
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = cx + 'px';
            ripple.style.top = cy + 'px';
            ripple.style.animationDelay = delays[i] + 'ms';
            container.appendChild(ripple);
            ripple.addEventListener('animationend', function() { ripple.remove(); });
        });
    }
})();
</script>
<script>
// 页面过渡淡入（从 dream 跳转来时）
(function() {
    var pt = document.getElementById('pageTransition');
    pt.classList.add('incoming');
    requestAnimationFrame(function() {
        pt.classList.add('done');
    });
    pt.addEventListener('transitionend', function() {
        pt.classList.remove('incoming', 'done');
    });
})();
</script>
<script src="/static/app-frontend.js"></script>
</body>
